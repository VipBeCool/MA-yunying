    /* ── 层级导航条 ── */
    .level-nav {
      display: flex; align-items: center; gap: 0;
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 6px 8px; margin-bottom: 20px;
      overflow-x: auto; white-space: nowrap;
    }
    .level-nav-item {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-radius: 8px; cursor: pointer; transition: all 0.18s;
      font-size: 13px; color: var(--gray-500); font-weight: 500;
      flex-shrink: 0;
    }
    .level-nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
    .level-nav-item.active {
      background: var(--brand-light); color: var(--brand); font-weight: 700;
      border: 1px solid var(--brand-border);
    }
    .level-nav-item .nav-icon {
      width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .level-nav-item .nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .level-nav-sep {
      color: var(--gray-300); font-size: 12px; padding: 0 2px; flex-shrink: 0;
    }

    /* ── 节点卡片 ── */
    .node-card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px;
      transition: all 0.18s; position: relative; overflow: hidden;
    }
    .node-card.clickable { cursor: pointer; }
    .node-card.clickable:hover {
      border-color: var(--brand); box-shadow: 0 6px 18px rgba(37,99,235,0.1);
      transform: translateY(-2px);
    }
    .node-card-header {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
    }
    .node-av {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .node-av.org { background: linear-gradient(135deg, #d1fae5, #ecfdf5); color: var(--brand); }
    .node-av.person { background: var(--gray-100); color: var(--gray-500); }
    .node-av.org svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .node-card-name { font-size: 15px; font-weight: 700; color: var(--gray-900); }
    .node-card-sub { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

    /* KPI 行 */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
    .kpi-box {
      background: var(--gray-50); border-radius: 9px; padding: 9px 6px; text-align: center;
      border: 1px solid var(--gray-100);
    }
    .kpi-val { font-size: 16px; font-weight: 800; color: var(--brand); }
    .kpi-val.muted { color: var(--gray-400); font-size: 14px; }
    .kpi-lbl { font-size: 10.5px; color: var(--gray-400); margin-top: 2px; }

    /* 卡片底部操作区 */
    .card-actions {
      display: flex; gap: 7px; margin-top: 12px;
    }

    
    /* 进度条 */
    .progress-bar-wrap {
      height: 6px; background: var(--gray-100); border-radius: 3px; margin: 12px 0 6px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; background: var(--brand); border-radius: 3px; transition: width 0.3s;
    }
    
    /* 节点类型Tab */
    .node-tabs {
      display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .node-tab {
      padding: 8px 4px; font-size: 14px; font-weight: 500; color: var(--gray-500);
      cursor: pointer; position: relative;
    }
    .node-tab.active {
      color: var(--brand); font-weight: 700;
    }
    .node-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--brand); border-radius: 2px 2px 0 0;
    }
    
    /* 排行榜Tab */
    .rank-tabs {
      display: flex; gap: 8px; background: var(--gray-100); padding: 4px; border-radius: 8px;
    }
    .rank-tab {
      padding: 4px 12px; font-size: 12px; font-weight: 500; color: var(--gray-500);
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .rank-tab.active {
      background: white; color: var(--gray-900); box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* 趋势迷你柱 */
    .mini-trend {
      display: flex; align-items: flex-end; gap: 2px; height: 26px; margin: 8px 0 4px;
    }
    .mini-trend-bar {
      flex: 1; border-radius: 2px 2px 0 0; background: var(--brand-border);
      min-height: 3px; transition: background 0.15s;
    }
    .mini-trend-bar.today { background: var(--brand); }

    /* 排行榜 */
    .rank-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 8px;
      transition: background 0.2s;
    }
    .rank-row:hover { background: var(--gray-50); }
    .rank-row:not(:last-child) { border-bottom: 1px dashed var(--gray-100); border-radius: 0; }
    .rank-row:last-child { border-bottom: none; }
    .rank-num {
      width: 22px; height: 22px; border-radius: 7px; font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rank-1, .rank-2, .rank-3 { background: var(--brand); color: #fff; }
    .rank-n { background: var(--gray-100); color: var(--gray-500); }

    /* 混合分区标题 */
    .section-divider {

    }

    .section-divider-label {
      font-size: 11.5px; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: 0.6px; padding: 0 4px;
    }
  </style>

<script>
if(!window._orgModalInited) {
  window._orgModalInited = true;
  function openOrgModal() { document.getElementById("globalOrgModal").style.display="flex"; }
  function closeOrgModal() { document.getElementById("globalOrgModal").style.display="none"; }
  function selectOrg(el,name) {
    document.querySelectorAll(".org-choice").forEach(function(c){ c.style.borderColor="#e5e7eb"; c.style.background="white"; c.querySelector("div").style.color="#1f2937"; });
    el.style.borderColor="#10b981"; el.style.background="#ecfdf5"; el.querySelector("div").style.color="#10b981";
    document.querySelectorAll("#globalOrgDisplay").forEach(function(e){ e.innerText=name; });
    setTimeout(function(){ closeOrgModal(); if(window.showToast) showToast("已切换至: "+name,"success"); if(window.doFilter) doFilter(); }, 250);
  }
  function filterOrgs(val) { document.querySelectorAll(".org-choice").forEach(function(c){ c.style.display=c.innerText.includes(val)?"":"none"; }); }
  document.getElementById("globalOrgModal").addEventListener("click",function(e){ if(e.target===this) closeOrgModal(); });
  window.openGlobalOrgModal = openOrgModal;
  window.closeGlobalOrgModal = closeOrgModal;
  // 事件代理，兼容动态渲染
  document.addEventListener("click", function(e) { if(e.target.closest("#globalOrgBtn")) openOrgModal(); });
}
</script>

/* ═══════════════════════════════════════
   工具函数
═══════════════════════════════════════ */
// 递归汇总节点数据（含直属 members）
function aggregateNode(node) {
  let base = { memberCount: 0, touch: 0, intent: 0, credit: 0, allocated: 0 };
  if (node.members) {
    base.memberCount += node.members.length;
    node.members.forEach(m => {
      base.touch += m.touch; base.intent += m.intent;
      base.credit += m.credit; base.allocated += m.allocated;
    });
  }
  if (node.children) {
    node.children.forEach(c => {
      const ca = aggregateNode(c);
      base.memberCount += ca.memberCount; base.touch += ca.touch;
      base.intent += ca.intent; base.credit += ca.credit; base.allocated += ca.allocated;
    });
  }
  return base;
}

// 查找节点
function findNode(id, node) {
  if (!node) node = ORG_TREE;
  if (node.id === id) return node;
  if (node.children) for (const c of node.children) { const f = findNode(id, c); if (f) return f; }
  return null;
}

// 获取路径
function getNodePath(id, node, path) {
  if (!node) node = ORG_TREE;
  if (!path) path = [];
  const cur = [...path, { id: node.id, name: node.name, level: node.level }];
  if (node.id === id) return cur;
  if (node.children) for (const c of node.children) { const r = getNodePath(id, c, cur); if (r) return r; }
  return null;
}

// 获取所有客户经理（扁平化，含直属）
function getAllMembers(node) {
  let all = node.members ? [...node.members] : [];
  if (node.children) node.children.forEach(c => { all = all.concat(getAllMembers(c)); });
  return all;
}

// 生成7日趋势柱 HTML
function trendBarsHtml(trendArr, maxBar) {
  if (!trendArr) return '';
  const m = maxBar || Math.max(...trendArr, 1);
  return trendArr.map((v, i) =>
    `<div class="mini-trend-bar${i === trendArr.length - 1 ? ' today' : ''}" style="height:${Math.max(Math.round(v / m * 100), 6)}%;"></div>`
  ).join('');
}

// 聚合趋势（子节点加总）
function aggregateTrend(node) {
  const days = 7;
  const arr = Array(days).fill(0);
  const all = getAllMembers(node);
  all.forEach(m => { if (m.trend) m.trend.forEach((v, i) => { arr[i] += v; }); });
  return arr;
}

/* ═══════════════════════════════════════
   渲染
═══════════════════════════════════════ */

let currentNodeTypeTab = 'org'; // 'org' or 'member'
let currentRankType = 'touch'; // 'touch', 'intent', 'credit'

function switchNodeTypeTab(tab) {
  currentNodeTypeTab = tab;
  renderNodeContent();
}

function switchRankTab(type, el) {
  currentRankType = type;
  document.querySelectorAll('.rank-tab').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  renderRank();
}

let currentNodeId = 'root';

function drillDown(nodeId) {
  currentNodeId = nodeId;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getOrgIcon(level) {
  if (level === 'province') return ICONS.network || SVG_ORG;
  if (level === 'city') return ICONS.briefcase || SVG_ORG;
  if (level === 'branch') return ICONS.home || SVG_ORG;
  if (level === 'team') return ICONS.flag || SVG_ORG;
  return ICONS.map_pin || SVG_ORG;
}

function render() {
  const node = findNode(currentNodeId) || ORG_TREE;
  const agg = aggregateNode(node);
  
  // 导航和KPI保持不变
  const path = getNodePath(currentNodeId) || [{ id: 'root', name: ORG_TREE.name, level: ORG_TREE.level }];
  document.getElementById('levelNav').innerHTML = path.map((p, i) => {
    const isLast = i === path.length - 1;
    return `
      ${i > 0 ? '<span class="level-nav-sep">›</span>' : ''}
      <div class="level-nav-item ${isLast ? 'active' : ''}" onclick="drillDown('${p.id}')">
        <span class="nav-icon">${getOrgIcon(p.level)}</span>
        ${p.name}
      </div>
    `;
  }).join('');

  document.getElementById('teamStats').innerHTML = [
    { icon: 'users',       label: '管辖客户经理', value: agg.memberCount, suffix: '人', featured: true },
    { icon: 'layers',      label: '已分配名单',   value: agg.allocated,   suffix: '家' },
    { icon: 'trending_up', label: '已触达',        value: agg.touch,       suffix: '家' },
    { icon: 'target',      label: '意向转化',      value: agg.intent,      suffix: '家' },
  ].map(s => `
    <div class="stat-card ${s.featured ? 'featured' : ''}" style="display: flex; align-items: center; justify-content: space-between; padding: 18px 22px;">
      <div>
        <div class="stat-label" style="margin-bottom: 6px;">${s.label}</div>
        <div class="stat-value">${s.value}<span class="stat-suffix">${s.suffix}</span></div>
      </div>
      <div class="stat-card-icon" style="margin-bottom: 0; width: 44px; height: 44px; border-radius: 12px;"><span style="width:22px;height:22px;">${ICONS[s.icon] || ''}</span></div>
    </div>
  `).join('');

  // 默认重置tab
  if (node.children && node.children.length > 0) {
    currentNodeTypeTab = 'org';
  } else {
    currentNodeTypeTab = 'member';
  }
  
  renderNodeContent();
  renderRank();
}

function renderNodeContent() {
  const node = findNode(currentNodeId) || ORG_TREE;
  let html = '';
  
  const hasChildren = node.children && node.children.length > 0;
  const hasMembers = node.members && node.members.length > 0;
  
  if (hasChildren && hasMembers) {
    html += `
      <div class="node-tabs">
        <div class="node-tab ${currentNodeTypeTab === 'org' ? 'active' : ''}" onclick="switchNodeTypeTab('org')">下级机构</div>
        <div class="node-tab ${currentNodeTypeTab === 'member' ? 'active' : ''}" onclick="switchNodeTypeTab('member')">直属客户经理</div>
      </div>
    `;
  }
  
  html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">`;
  
  if (currentNodeTypeTab === 'org' && hasChildren) {
    html += node.children.map(c => renderOrgCard(c)).join('');
  } else if (currentNodeTypeTab === 'member' && hasMembers) {
    html += node.members.map(m => renderMemberCard(m)).join('');
  } else if (currentNodeTypeTab === 'org' && !hasChildren && hasMembers) {
    // Edge case if somehow tab state gets desynced
    html += node.members.map(m => renderMemberCard(m)).join('');
  }
  
  html += `</div>`;
  document.getElementById('nodeContent').innerHTML = html;
}

function renderRank() {
  const node = findNode(currentNodeId) || ORG_TREE;
  const allMembers = getAllMembers(node);
  
  if (node.children && !node.children.every(c => c.members && !c.children)) {
    const orgRank = node.children.map(c => {
      const ca = aggregateNode(c);
      return { name: c.name, touch: ca.touch, intent: ca.intent, credit: ca.credit, memberCount: ca.memberCount, id: c.id };
    });
    renderOrgRank(orgRank);
  } else {
    renderMemberRank(allMembers);
  }
}
function renderOrgCard(c) {
  const agg = aggregateNode(c);
  const convRate = agg.touch > 0 ? (agg.intent / agg.touch * 100).toFixed(1) : '0.0';
  const reachRate = agg.allocated > 0 ? (agg.touch / agg.allocated * 100).toFixed(1) : '0.0';
  const orgUrl = encodeURIComponent(c.name);
  return `
    <div class="node-card clickable" onclick="drillDown('${c.id}')">
      <div class="node-card-header">
        <div class="node-av org">${getOrgIcon(c.level)}</div>
        <div style="flex:1;min-width:0;">
          <div class="node-card-name">${c.name}</div>
          <div class="node-card-sub">${agg.memberCount} 名客户经理</div>
        </div>
        <span class="tag tag-blue" style="font-size:11px;white-space:nowrap;">${convRate}% 意向转化</span>
      </div>
      <div class="kpi-row">
        <div class="kpi-box"><div class="kpi-val">${agg.allocated}</div><div class="kpi-lbl">已分配</div></div>
        <div class="kpi-box"><div class="kpi-val">${agg.touch}</div><div class="kpi-lbl">已触达</div></div>
        <div class="kpi-box"><div class="kpi-val">${agg.intent}</div><div class="kpi-lbl">意向</div></div>
        <div class="kpi-box"><div class="kpi-val ${agg.credit > 0 ? '' : 'muted'}">${agg.credit > 0 ? agg.credit + '万' : '—'}</div><div class="kpi-lbl">授信</div></div>
      </div>
      
      <div class="progress-bar-wrap"><div class="progress-bar-inner" style="width:${Math.min(reachRate, 100)}%;"></div></div>
      <div style="font-size:10.5px;color:var(--gray-400);text-align:right;margin-top:6px;">触达/已分配：${reachRate}%</div>
      
      <div class="card-actions">
        <button class="btn btn-default btn-sm" style="flex:1;font-size:12px;" onclick="event.stopPropagation();window.location.href='customers.html?org=${orgUrl}'">
          查看客户
        </button>
      </div>
    </div>
  `;
}

function renderMemberCard(m) {
  const convRate = m.touch > 0 ? (m.intent / m.touch * 100).toFixed(1) : '0.0';
  const reachRate = m.allocated > 0 ? (m.touch / m.allocated * 100).toFixed(1) : '0.0';
  const convNum = parseFloat(convRate);
  const tagCls = convNum >= 20 ? 'tag-green' : convNum >= 10 ? 'tag-blue' : 'tag-amber';
  return `
    <div class="node-card">
      <div class="node-card-header">
        <div class="node-av person">${SVG_PERSON}</div>
        <div style="flex:1;min-width:0;">
          <div class="node-card-name">${m.name}</div>
          <div class="node-card-sub">客户经理</div>
        </div>
        <span class="tag ${tagCls}" style="font-size:11px;white-space:nowrap;">${convRate}% 意向转化</span>
      </div>
      <div class="kpi-row">
        <div class="kpi-box"><div class="kpi-val">${m.allocated}</div><div class="kpi-lbl">已分配</div></div>
        <div class="kpi-box"><div class="kpi-val">${m.touch}</div><div class="kpi-lbl">已触达</div></div>
        <div class="kpi-box"><div class="kpi-val">${m.intent}</div><div class="kpi-lbl">意向</div></div>
        <div class="kpi-box"><div class="kpi-val ${m.credit > 0 ? '' : 'muted'}">${m.credit > 0 ? m.credit + '万' : '—'}</div><div class="kpi-lbl">授信</div></div>
      </div>
      
      <div class="progress-bar-wrap"><div class="progress-bar-inner" style="width:${Math.min(reachRate, 100)}%;"></div></div>
      <div style="font-size:10.5px;color:var(--gray-400);text-align:right;margin-top:6px;">触达/已分配：${reachRate}%</div>
      
      <div class="card-actions">
        <button class="btn btn-default btn-sm" style="flex:1;font-size:12px;" onclick="window.location.href='customers.html?owner=${m.id}'">
          查看客户
        </button>
      </div>
    </div>
  `;
}
function renderMemberRank(members) {
  document.getElementById('rankTitle').textContent = '客户经理排行';
  const sorted = [...members].sort((a, b) => b[currentRankType] - a[currentRankType]).slice(0, 12);
  
  let label = currentRankType === 'touch' ? '触达' : currentRankType === 'intent' ? '意向' : '授信';
  let unit = currentRankType === 'credit' ? '万' : '家';
  
  document.getElementById('rankList').innerHTML = sorted.map((m, i) => `
    <div class="rank-row">
      <div class="rank-num ${i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n'}">${i + 1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.name}</div>
      </div>
      <div style="text-align:right;flex-shrink:0; display:flex; align-items:baseline; gap:4px;">
        <div style="font-size:15px;font-weight:800;color:var(--brand);">${m[currentRankType] > 0 ? m[currentRankType] : '0'}</div>
        <div style="font-size:11px;color:var(--gray-400);">${unit}</div>
      </div>
    </div>
  `).join('');
}

function renderOrgRank(orgList) {
  document.getElementById('rankTitle').textContent = '排行榜';
  const sorted = [...orgList].sort((a, b) => b[currentRankType] - a[currentRankType]).slice(0, 12);
  
  let label = currentRankType === 'touch' ? '触达' : currentRankType === 'intent' ? '意向' : '授信';
  let unit = currentRankType === 'credit' ? '万' : '家';
  
  document.getElementById('rankList').innerHTML = sorted.map((o, i) => `
    <div class="rank-row">
      <div class="rank-num ${i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n'}">${i + 1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${o.name}</div>
      </div>
      <div style="text-align:right;flex-shrink:0; display:flex; align-items:baseline; gap:4px;">
        <div style="font-size:15px;font-weight:800;color:var(--brand);">${o[currentRankType] > 0 ? o[currentRankType] : '0'}</div>
