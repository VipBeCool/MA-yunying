<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <title>规则引擎 - 智能营销平台</title>
    <link rel="stylesheet" href="css/style.css?v=1783685212">
    
</head>

<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content anim-fade-in">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="page-title">规则引擎</h1>
                    <p class="page-breadcrumb"><a href="index.html">工作台</a> / 规则引擎</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('ruleModal')">+ 新建规则</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">获客规则列表</h3>
                    <span class="card-extra">共 12 条规则</span>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>规则名称</th>
                            <th>所属产品</th>
                            <th>筛选条件</th>
                            <th>推送量</th>
                            <th>转化率</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="company-name">规则A-高新科技</span></td>
                            <td>江苏银行-科技贷</td>
                            <td style="font-size: 12px; color: #595959;">高新技术企业 + 苏信分≥750 + 专利≥5</td>
                            <td>3,200</td>
                            <td style="color: var(--brand); font-weight: 600;">4.2%</td>
                            <td><span class="status-dot dot-green">运行中</span></td>
                            <td>
                                <button class="btn btn-text btn-sm">编辑</button>
                                <button class="btn btn-text btn-sm">暂停</button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="company-name">规则B-专精特新</span></td>
                            <td>江苏银行-科技贷</td>
                            <td style="font-size: 12px; color: #595959;">专精特新认定 + 营收≥2000万</td>
                            <td>2,800</td>
                            <td style="color: var(--brand); font-weight: 600;">3.8%</td>
                            <td><span class="status-dot dot-green">运行中</span></td>
                            <td>
                                <button class="btn btn-text btn-sm">编辑</button>
                                <button class="btn btn-text btn-sm">暂停</button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="company-name">规则C-纳税大户</span></td>
                            <td>江苏银行-税e融</td>
                            <td style="font-size: 12px; color: #595959;">年纳税≥100万 + 无司法案件</td>
                            <td>2,500</td>
                            <td style="color: var(--brand); font-weight: 600;">3.5%</td>
                            <td><span class="status-dot dot-green">运行中</span></td>
                            <td>
                                <button class="btn btn-text btn-sm">编辑</button>
                                <button class="btn btn-text btn-sm">暂停</button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="company-name">规则D-园区企业</span></td>
                            <td>苏州农商行-园区贷</td>
                            <td style="font-size: 12px; color: #595959;">苏州工业园区 + 制造业</td>
                            <td>3,000</td>
                            <td style="color: var(--brand); font-weight: 600;">3.1%</td>
                            <td><span class="status-dot dot-amber">已暂停</span></td>
                            <td>
                                <button class="btn btn-text btn-sm">编辑</button>
                                <button class="btn btn-text btn-sm">启用</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 新建规则模态框 -->
    <div class="modal-overlay" id="ruleModal">
        <div class="modal" style="max-width: 640px;">
            <div class="modal-header">
                <h3 class="modal-title">新建获客规则</h3>
                <div class="modal-close" onclick="closeModal('ruleModal')">✕</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">规则名称 *</label>
                    <input type="text" class="form-control" placeholder="例如：规则E-高成长企业">
                </div>
                <div class="form-group">
                    <label class="form-label">所属产品 *</label>
                    <select class="form-control">
                        <option>江苏银行-科技贷</option>
                        <option>江苏银行-税e融</option>
                        <option>南京银行-专精特新贷</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">筛选条件</label>
                    <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                                <input type="checkbox" checked> 苏信分 ≥ <input type="number" class="form-control"
                                    style="width: 80px;" value="700">
                            </label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                                <input type="checkbox"> 年营收 ≥ <input type="number" class="form-control"
                                    style="width: 80px;" placeholder="万元"> 万元
                            </label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                                <input type="checkbox"> 高新技术企业认定
                            </label>
                        </div>
                        <div>
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                                <input type="checkbox" checked> 无司法案件
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">每日推送上限</label>
                    <input type="number" class="form-control" placeholder="默认不限制" value="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('ruleModal')">取消</button>
                <button class="btn btn-primary">创建规则</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>

  <script src="js/sidebar.js"></script>
  <script>
    renderSidebar({ currentPage: 'rules' });
  </script>
  <script src="js/toast.js"></script>
</body>

</html>
